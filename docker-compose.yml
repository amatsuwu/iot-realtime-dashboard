version: '3.8'

services:
  db:
    image: mariadb:11.7
    container_name: monitor_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_PASSWORD:-my_secure_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-monitor_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: monitor_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MARIADB_HOST=db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: monitor_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  db_data:
